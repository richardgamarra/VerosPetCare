<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FFF0F5"/>

  <!-- Top accent bar -->
  <rect width="1200" height="12" fill="#A0274A"/>

  <!-- Bottom accent bar -->
  <rect y="618" width="1200" height="12" fill="#A0274A"/>

  <!-- Left accent bar -->
  <rect width="12" height="630" fill="#F0B800"/>

  <!-- Right accent bar -->
  <rect x="1188" width="12" height="630" fill="#F0B800"/>

  <!-- Decorative circle backdrop behind paw -->
  <circle cx="600" cy="255" r="130" fill="#C9507A" opacity="0.15"/>
  <circle cx="600" cy="255" r="110" fill="#A0274A" opacity="0.08"/>

  <!-- Paw print -->
  <ellipse cx="600" cy="295" rx="62" ry="52" fill="#A0274A"/>
  <ellipse cx="530" cy="228" rx="28" ry="22" fill="#A0274A" transform="rotate(-20 530 228)"/>
  <ellipse cx="571" cy="205" rx="26" ry="20" fill="#A0274A" transform="rotate(-8 571 205)"/>
  <ellipse cx="630" cy="205" rx="26" ry="20" fill="#A0274A" transform="rotate(8 630 205)"/>
  <ellipse cx="671" cy="228" rx="28" ry="22" fill="#A0274A" transform="rotate(20 671 228)"/>

  <!-- Business name -->
  <text x="600" y="430" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="bold" fill="#A0274A" text-anchor="middle" letter-spacing="1">Vero's Pet Care</text>

  <!-- Divider -->
  <line x1="370" y1="458" x2="830" y2="458" stroke="#F0B800" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Location -->
  <text x="600" y="504" font-family="Georgia, 'Times New Roman', serif" font-size="38" fill="#F0B800" text-anchor="middle" letter-spacing="3">Fairfax, VA</text>

  <!-- Tagline -->
  <text x="600" y="556" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#C9507A" opacity="0.85" text-anchor="middle" letter-spacing="1">Loving care for your furry family</text>
</svg>
